apiVersion: batch/v1
kind: CronJob
metadata:
  name: polymarket-autopilot-report
  namespace: polymarket-autopilot
spec:
  schedule: "0 8 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: report
              image: ghcr.io/laurynasjurys/polymarket-autopilot@sha256:acf4771b9e7c28139ada17b6c882e9652f7e9bc729402753afddc77729704073
              command: ["sh", "-lc", "node src/init-db.js && node src/report.js"]
              envFrom:
                - configMapRef:
                    name: polymarket-autopilot-config
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: polymarket-autopilot-data
