apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polymarket-oauth2-proxy
  namespace: polymarket-autopilot
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - polymarket.jurys.lt
      secretName: polymarket-autopilot-tls
  rules:
    - host: polymarket.jurys.lt
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: polymarket-oauth2-proxy
                port:
                  number: 4180
