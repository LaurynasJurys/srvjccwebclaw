apiVersion: batch/v1
kind: Job
metadata:
  name: polymarket-reconcile-keycloak
  namespace: polymarket-autopilot
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: reconcile
          image: python:3.12-alpine
          command: ["/bin/sh", "-lc"]
          args:
            - >-
              set -euo pipefail;
              apk add --no-cache ca-certificates wget unzip kubectl >/dev/null;
              VAULT_VERSION="1.18.4";
              ARCH="$(uname -m)";
              case "$ARCH" in
                x86_64) VAULT_ARCH="amd64" ;;
                aarch64) VAULT_ARCH="arm64" ;;
                *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
              esac;
              wget -qO /tmp/vault.zip "https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_linux_${VAULT_ARCH}.zip";
              unzip -p /tmp/vault.zip vault >/usr/local/bin/vault;
              chmod +x /usr/local/bin/vault;
              python /app/reconcile.py
          env:
            - name: VAULT_ADDR
              value: http://127.0.0.1:8200
            - name: KEYCLOAK_BASE
              value: https://auth.jurys.lt
            - name: KEYCLOAK_REALM
              value: jcc
            - name: CLIENT_ID
              value: polymarket-autopilot
            - name: REDIRECT_URL
              value: https://polymarket.jurys.lt/oauth2/callback
            - name: WEB_ORIGIN
              value: https://polymarket.jurys.lt
            - name: K8S_SECRET
              value: polymarket-oauth2-proxy
            - name: K8S_NAMESPACE
              value: polymarket-autopilot
            - name: OAUTH2_PROXY_COOKIE_SECRET
              value: Y8Gd4OQktDSdRQ66yibVzes_4HKPwZumdxE--IGVFk0
          volumeMounts:
            - name: script
              mountPath: /app
            - name: vault-approle
              mountPath: /root/.vault
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: polymarket-reconcile-keycloak
            defaultMode: 0555
        - name: vault-approle
          hostPath:
            path: /root/.vault
            type: Directory
