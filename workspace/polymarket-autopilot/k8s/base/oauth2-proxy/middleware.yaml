apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: polymarket-forward-auth
  namespace: polymarket-autopilot
spec:
  forwardAuth:
    address: http://polymarket-oauth2-proxy.polymarket-autopilot.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Preferred-Username
      - X-Auth-Request-Access-Token
      - Authorization
