apiVersion: v1
kind: ConfigMap
metadata:
  name: polymarket-autopilot-config
  namespace: polymarket-autopilot
data:
  POLYMARKET_DB_PATH: /data/paper_trading.db
  POLYMARKET_MARKETS_URL: https://gamma-api.polymarket.com/markets
  POLYMARKET_MAX_MARKETS: "25"
  POLYMARKET_MIN_LIQUIDITY: "50000"
  POLYMARKET_MIN_VOLUME: "10000"
  POLYMARKET_MAX_POSITION_FRACTION: "0.02"
  POLYMARKET_MAX_HOLDING_HOURS: "24"
  POLYMARKET_STARTING_CASH: "10000"
  POLYMARKET_PRICE_MOVE_THRESHOLD: "0.03"
  POLYMARKET_TREND_VOLUME_SPIKE: "1.2"
  POLYMARKET_REPORT_LOOKBACK_HOURS: "24"
